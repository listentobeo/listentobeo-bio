<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@listentobeo — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --amber:#C8860A;--amber-light:#E5A92A;--amber-dim:rgba(200,134,10,0.12);
  --bg:#0A0806;--bg2:#110E09;--bg3:#1C1710;
  --text:#F0EAE0;--text-muted:#9A9080;--text-dim:#5A5248;
  --border:rgba(200,134,10,0.2);--border-soft:rgba(240,234,224,0.07);
  --sans:'Outfit',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-box{width:100%;max-width:360px;border:1px solid var(--border);background:var(--bg2);padding:2.5rem 2rem}
.login-logo{font-size:0.7rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--amber);margin-bottom:2rem}
.login-title{font-size:1.5rem;font-weight:400;color:var(--text);margin-bottom:0.35rem}
.login-sub{font-size:0.82rem;color:var(--text-muted);margin-bottom:2rem}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--border-soft);color:var(--text);font-family:var(--sans);font-size:0.9rem;padding:0.75rem 1rem;margin-bottom:0.75rem;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:var(--amber)}
.login-box button{width:100%;background:var(--amber);border:none;color:#0A0806;font-family:var(--sans);font-size:0.82rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:0.8rem;cursor:pointer;transition:background .2s}
.login-box button:hover{background:var(--amber-light)}
.login-error{font-size:0.78rem;color:#E24B4A;margin-top:0.5rem;display:none}

/* DASHBOARD */
#dashboard{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2rem;border-bottom:1px solid var(--border-soft);position:sticky;top:0;background:var(--bg);z-index:10;flex-wrap:wrap;gap:0.75rem}
.topbar-logo{font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--amber)}
.logout-btn{font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);background:none;border:1px solid var(--border-soft);padding:0.4rem 0.9rem;cursor:pointer;font-family:var(--sans);transition:color .2s,border-color .2s}
.logout-btn:hover{color:var(--amber);border-color:var(--amber)}

/* FILTER TABS */
.filter-bar{display:flex;gap:0.4rem;padding:1.25rem 2rem 0;flex-wrap:wrap}
.filter-btn{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.4rem 0.85rem;border:1px solid var(--border-soft);background:transparent;color:var(--text-dim);font-family:var(--sans);cursor:pointer;transition:all .2s}
.filter-btn:hover{color:var(--text);border-color:var(--border)}
.filter-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber-light)}

.content{padding:1.5rem 2rem 3rem;max-width:1100px;margin:0 auto}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.75rem}
.stat-card{background:var(--bg2);border:1px solid var(--border-soft);padding:1.25rem 1.5rem}
.stat-label{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.4rem}
.stat-value{font-size:2rem;font-weight:400;color:var(--amber-light);line-height:1}
.stat-value.sm{font-size:1.1rem;padding-top:0.45rem}
.stat-sub{font-size:0.7rem;color:var(--text-dim);margin-top:0.3rem}

/* SECTION HEAD */
.section-head{font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--amber);margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem}
@media(max-width:700px){.charts-grid{grid-template-columns:1fr}}
.chart-box{background:var(--bg2);border:1px solid var(--border-soft);padding:1.5rem}

/* BAR CHART */
.bar-list{display:flex;flex-direction:column;gap:0.65rem}
.bar-row{display:flex;align-items:center;gap:0.75rem}
.bar-name{font-size:0.75rem;color:var(--text-muted);min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg3);height:5px;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;background:var(--amber);border-radius:3px;transition:width .5s ease}
.bar-count{font-size:0.75rem;color:var(--text);min-width:28px;text-align:right}

/* SPARKLINE */
.sparkline-wrap{height:100px;margin-top:0.5rem;position:relative}
canvas#sparkline{width:100%;height:100px}

/* RECENT TABLE */
.recent-box{background:var(--bg2);border:1px solid var(--border-soft);padding:1.5rem}
.recent-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.recent-table th{text-align:left;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);padding:0.5rem 0.75rem;border-bottom:1px solid var(--border-soft);font-weight:400}
.recent-table td{padding:0.6rem 0.75rem;border-bottom:1px solid var(--border-soft);color:var(--text-muted);vertical-align:middle}
.recent-table tr:last-child td{border-bottom:none}
.recent-table td:first-child{color:var(--text)}
.pill{display:inline-block;font-size:0.65rem;letter-spacing:0.08em;padding:0.2rem 0.6rem;background:var(--amber-dim);color:var(--amber);border:1px solid var(--border)}
.loading-txt{color:var(--text-dim);font-size:0.85rem;padding:2rem 0;text-align:center}
.empty{color:var(--text-dim);font-size:0.8rem;padding:1rem 0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">@listentobeo</p>
    <h1 class="login-title">Dashboard</h1>
    <p class="login-sub">Enter your password to view analytics.</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
    <button onclick="doLogin()">Enter →</button>
    <p class="login-error" id="login-error">Wrong password. Try again.</p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <span class="topbar-logo">@listentobeo · Analytics</span>
    <button class="logout-btn" onclick="doLogout()">Log out</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn" data-range="24h">24h</button>
    <button class="filter-btn" data-range="7d">7 days</button>
    <button class="filter-btn active" data-range="30d">30 days</button>
    <button class="filter-btn" data-range="3m">3 months</button>
    <button class="filter-btn" data-range="6m">6 months</button>
    <button class="filter-btn" data-range="1y">1 year</button>
    <button class="filter-btn" data-range="2y">2 years</button>
  </div>

  <div class="content">
    <div id="loading" class="loading-txt">Loading…</div>
    <div id="main" style="display:none">

      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">All-time clicks</p>
          <p class="stat-value" id="stat-total">—</p>
          <p class="stat-sub">Since launch</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">In selected range</p>
          <p class="stat-value" id="stat-range">—</p>
          <p class="stat-sub" id="stat-range-label">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Today</p>
          <p class="stat-value" id="stat-today">—</p>
          <p class="stat-sub" id="stat-today-date">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-label">Top link</p>
          <p class="stat-value sm" id="stat-top">—</p>
          <p class="stat-sub" id="stat-top-count">all time</p>
        </div>
      </div>

      <div class="charts-grid">
        <div class="chart-box">
          <p class="section-head">Clicks by link <span style="color:var(--text-dim);font-size:0.6rem">(all time)</span></p>
          <div class="bar-list" id="bar-list"></div>
        </div>
        <div class="chart-box">
          <p class="section-head">Daily clicks</p>
          <div class="sparkline-wrap">
            <canvas id="sparkline"></canvas>
          </div>
        </div>
      </div>

      <div class="recent-box">
        <p class="section-head">Recent clicks</p>
        <table class="recent-table">
          <thead><tr><th>Link</th><th>Time</th></tr></thead>
          <tbody id="recent-body"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
const SESSION_KEY = 'bio_dash_pw';
let currentRange = '30d';
let savedPw = '';

function doLogin() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  savedPw = pw;
  sessionStorage.setItem(SESSION_KEY, pw);
  loadDashboard(pw, currentRange);
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    if (savedPw) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('main').style.display = 'none';
      loadDashboard(savedPw, currentRange);
    }
  });
});

async function loadDashboard(pw, range) {
  try {
    const res = await fetch(`/api/clicks?password=${encodeURIComponent(pw)}&range=${range}`);
    if (res.status === 401) {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      return;
    }
    const data = await res.json();
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    renderDashboard(data, range);
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

const RANGE_LABELS = {
  '24h': 'Last 24 hours',
  '7d': 'Last 7 days',
  '30d': 'Last 30 days',
  '3m': 'Last 3 months',
  '6m': 'Last 6 months',
  '1y': 'Last year',
  '2y': 'Last 2 years',
};

function renderDashboard(data, range) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  document.getElementById('stat-total').textContent = (data.total || 0).toLocaleString();
  document.getElementById('stat-range').textContent = (data.rangeTotal || 0).toLocaleString();
  document.getElementById('stat-range-label').textContent = RANGE_LABELS[range] || range;

  const today = new Date().toISOString().slice(0, 10);
  const todayEntry = data.daily.find(d => d.date === today);
  document.getElementById('stat-today').textContent = todayEntry ? todayEntry.count : '0';
  document.getElementById('stat-today-date').textContent = today;

  if (data.links.length > 0) {
    document.getElementById('stat-top').textContent = formatName(data.links[0].name);
    document.getElementById('stat-top-count').textContent = data.links[0].count.toLocaleString() + ' clicks · all time';
  }

  // Bar chart
  const maxCount = data.links[0]?.count || 1;
  const barList = document.getElementById('bar-list');
  barList.innerHTML = data.links.length ? '' : '<p class="empty">No clicks yet.</p>';
  data.links.forEach(link => {
    const pct = Math.round((link.count / maxCount) * 100);
    barList.innerHTML += `
      <div class="bar-row">
        <span class="bar-name">${formatName(link.name)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-count">${link.count.toLocaleString()}</span>
      </div>`;
  });

  // Sparkline
  drawSparkline(data.daily, range);

  // Recent
  const tbody = document.getElementById('recent-body');
  tbody.innerHTML = '';
  if (!data.recent.length) {
    tbody.innerHTML = '<tr><td colspan="2" class="empty">No clicks recorded yet.</td></tr>';
    return;
  }
  data.recent.forEach(r => {
    const dt = new Date(r.at);
    const timeStr = dt.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) +
                    ' · ' + dt.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
    tbody.innerHTML += `
      <tr>
        <td><span class="pill">${formatName(r.link)}</span></td>
        <td>${timeStr}</td>
      </tr>`;
  });
}

function formatName(name) {
  const map = {
    'buy-art':'Buy My Art','portrait':'Commission Portrait',
    'mural':'Book a Mural','event-painting':'Live Event Painting',
    'music-mrdj':'Mr DJ (Spotify)','tool-photo':'Photo to Art Tool',
    'tool-mural':'Mural Visualizer','aihdstudio':'AI HD Studio','beoarts':'Beo Art Studio',
  };
  return map[name] || name;
}

function drawSparkline(daily, range) {
  const canvas = document.getElementById('sparkline');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 300;
  const h = 100;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const counts = daily.map(d => d.count);
  if (!counts.some(c => c > 0)) {
    ctx.fillStyle = 'rgba(240,234,224,0.2)';
    ctx.font = '12px Outfit, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No data yet', w / 2, h / 2);
    return;
  }

  // For ranges > 30 days, group by week to keep chart readable
  let points = daily;
  if (daily.length > 90) {
    const grouped = [];
    for (let i = 0; i < daily.length; i += 7) {
      const slice = daily.slice(i, i + 7);
      grouped.push({ date: slice[0].date, count: slice.reduce((s, d) => s + d.count, 0) });
    }
    points = grouped;
  } else if (daily.length > 30) {
    const grouped = [];
    for (let i = 0; i < daily.length; i += 3) {
      const slice = daily.slice(i, i + 3);
      grouped.push({ date: slice[0].date, count: slice.reduce((s, d) => s + d.count, 0) });
    }
    points = grouped;
  }

  const vals = points.map(p => p.count);
  const maxVal = Math.max(...vals, 1);
  const padX = 4, padY = 10;
  const chartW = w - padX * 2;
  const chartH = h - padY * 2;
  const xStep = points.length > 1 ? chartW / (points.length - 1) : chartW;

  // Grid
  ctx.strokeStyle = 'rgba(240,234,224,0.05)';
  ctx.lineWidth = 1;
  [0.33, 0.66, 1].forEach(pct => {
    const y = padY + chartH * (1 - pct);
    ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(w - padX, y); ctx.stroke();
  });

  // Fill
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = padX + i * xStep;
    const y = padY + chartH * (1 - p.count / maxVal);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(padX + (points.length - 1) * xStep, h - padY);
  ctx.lineTo(padX, h - padY);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, padY, 0, h);
  grad.addColorStop(0, 'rgba(200,134,10,0.28)');
  grad.addColorStop(1, 'rgba(200,134,10,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  points.forEach((p, i) => {
    const x = padX + i * xStep;
    const y = padY + chartH * (1 - p.count / maxVal);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#C8860A';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Peak dot
  const peakIdx = vals.indexOf(Math.max(...vals));
  const px = padX + peakIdx * xStep;
  const py = padY + chartH * (1 - vals[peakIdx] / maxVal);
  ctx.beginPath();
  ctx.arc(px, py, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#E5A92A';
  ctx.fill();

  // Peak label
  ctx.fillStyle = 'rgba(229,169,42,0.85)';
  ctx.font = `${11 * dpr / dpr}px Outfit, sans-serif`;
  ctx.textAlign = px > w * 0.8 ? 'right' : 'left';
  ctx.fillText(vals[peakIdx], px + (px > w * 0.8 ? -8 : 8), py - 6);
}

// Auto-login if session stored
const saved = sessionStorage.getItem(SESSION_KEY);
if (saved) { savedPw = saved; loadDashboard(saved, currentRange); }
</script>
</body>
</html>
